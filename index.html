<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Traffic Intersection Simulator</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      background: #090d16;
      /* Глубокий космический черный */
      color: #f3f4f6;
      font-family: "Plus Jakarta Sans", sans-serif;
      min-height: 100vh;
      padding: 20px;
      overflow-x: hidden;
    }

    h1 {
      margin: 15px 0 25px 0;
      font-size: 1.8rem;
      font-weight: 800;
      letter-spacing: -0.5px;
      background: linear-gradient(135deg, #00f2fe 0%, #4facfe 100%);
      background-clip: text;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-shadow: 0 10px 20px rgba(0, 242, 254, 0.15);
    }

    #canvas {
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 16px;
      background: #111827;
      max-width: 100%;
      height: auto;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5),
        0 0 50px rgba(79, 172, 254, 0.05);
      transition: transform 0.3s ease;
    }

    #counters {
      display: flex;
      justify-content: space-around;
      flex-wrap: wrap;
      gap: 15px;
      margin-top: 25px;
      padding: 16px 24px;
      background: rgba(22, 33, 62, 0.4);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(255, 255, 255, 0.05);
      border-radius: 14px;
      max-width: 900px;
      width: 100%;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
    }

    #counters div {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.9rem;
      font-weight: 500;
      color: #9ca3af;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    #counters div span {
      color: #00f2fe;
      font-weight: 700;
      text-shadow: 0 0 10px rgba(0, 242, 254, 0.3);
    }

    #controls {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 20px;
      margin-top: 20px;
      padding: 20px;
      background: rgba(17, 24, 39, 0.6);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.05);
      border-radius: 18px;
      max-width: 900px;
      width: 100%;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4);
    }

    /* Карточки-группы внутри панели управления */
    .control-group {
      padding: 20px;
      background: rgba(31, 41, 55, 0.4);
      border: 1px solid rgba(255, 255, 255, 0.03);
      border-radius: 12px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      transition: border 0.3s ease, background 0.3s ease;
    }

    .control-group:hover {
      border: 1px solid rgba(0, 242, 254, 0.15);
      background: rgba(31, 41, 55, 0.6);
    }

    .control-group h3 {
      font-size: 0.95rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #00f2fe;
      padding-bottom: 8px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
      margin-bottom: 5px;
    }

    button {
      padding: 10px 16px;
      margin: 2px;
      border: none;
      border-radius: 8px;
      background: linear-gradient(135deg, #ff416c 0%, #ff4b2b 100%);
      color: white;
      font-family: "Plus Jakarta Sans", sans-serif;
      font-weight: 600;
      font-size: 0.85rem;
      cursor: pointer;
      box-shadow: 0 4px 15px rgba(255, 75, 43, 0.2);
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(255, 75, 43, 0.35);
      filter: brightness(1.1);
    }

    button:active {
      transform: translateY(0);
    }

    button.secondary {
      background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
      box-shadow: 0 4px 15px rgba(79, 172, 254, 0.2);
    }

    button.secondary:hover {
      box-shadow: 0 6px 20px rgba(79, 172, 254, 0.35);
    }

    #allGreenBtn {
      margin-top: auto;
      transition: all 0.3s ease;
    }

    .slider-row {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin: 8px 0;
    }

    .slider-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.85rem;
      color: #9ca3af;
    }

    .slider-header span {
      font-family: 'JetBrains Mono', monospace;
      color: #00f2fe;
      font-weight: 600;
    }

    input[type="range"] {
      -webkit-appearance: none;
      appearance: none;
      width: 100%;
      height: 6px;
      background: #1f2937;
      border-radius: 8px;
      outline: none;
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: #00f2fe;
      cursor: pointer;
      box-shadow: 0 0 10px rgba(0, 242, 254, 0.8);
      transition: transform 0.1s, background-color 0.1s;
    }

    input[type="range"]::-webkit-slider-thumb:hover {
      transform: scale(1.2);
      background: #fff;
    }

    input[type="range"]::-moz-range-thumb {
      width: 16px;
      height: 16px;
      border: none;
      border-radius: 50%;
      background: #00f2fe;
      cursor: pointer;
      box-shadow: 0 0 10px rgba(0, 242, 254, 0.8);
      transition: transform 0.1s, background-color 0.1s;
    }

    input[type="range"]::-moz-range-thumb:hover {
      transform: scale(1.2);
      background: #fff;
    }

    .checkbox-container {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 10px;
      background: rgba(17, 24, 39, 0.3);
      border-radius: 8px;
      margin: 4px 0;
      font-size: 0.85rem;
      color: #d1d5db;
      cursor: pointer;
      user-select: none;
    }

    .switch {
      position: relative;
      display: inline-block;
      width: 38px;
      height: 20px;
    }

    .switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .slider-toggle {
      position: absolute;
      cursor: pointer;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: #374151;
      transition: .3s;
      border-radius: 20px;
    }

    .slider-toggle:before {
      position: absolute;
      content: "";
      height: 14px;
      width: 14px;
      left: 3px;
      bottom: 3px;
      background-color: white;
      transition: .3s;
      border-radius: 50%;
    }

    input:checked+.slider-toggle {
      background-color: #00f2fe;
      box-shadow: 0 0 10px rgba(0, 242, 254, 0.4);
    }

    input:checked+.slider-toggle:before {
      transform: translateX(18px);
    }

    @media (max-width: 940px) {
      body {
        padding: 10px;
      }

      #controls {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>
  <h1>🚦 Traffic Intersection Simulator</h1>
  <canvas id="canvas" width="1200" height="800"></canvas>

  <div id="counters">
    <div>🚗 Cars: <span id="carCount">0</span></div>
    <div>🧑‍🤝‍🧑 Pedestrians: <span id="pedCount">0</span></div>
    <div>⏱️ Avg Wait: <span id="avgWait">0.0</span>s</div>
    <div>🚥 Lights: <span id="lightState">N-S: Red | E-W: Red</span></div>
  </div>

  <div id="controls">
    <div class="control-group">
      <h3>🚗 Car Controls</h3>
      <button id="spawnBtn">Spawn Random Car</button>
      <button id="clearBtn" class="secondary">Clear All</button>
      <button id="pauseBtn">⏸️ Pause</button>

      <div class="slider-row">
        <div class="slider-header">
          <label for="simSpeed">Sim Speed:</label>
          <span id="simSpeedVal">1.0x</span>
        </div>
        <input type="range" id="simSpeed" min="0.5" max="4" step="0.1" value="1">
      </div>

      <div class="slider-row">
        <div class="slider-header">
          <label for="spawnRate">Spawn Rate:</label>
          <span id="spawnRateVal">2/s</span>
        </div>
        <input type="range" id="spawnRate" min="0" max="10" step="1" value="2">
      </div>
    </div>

    <div class="control-group">
      <h3>🚦 Light Timings (N-S / E-W)</h3>
      <div class="slider-row">
        <div class="slider-header">
          <label for="redTime">Red Time:</label>
          <span id="redTimeVal">20s</span>
        </div>
        <input type="range" id="redTime" min="5" max="30" step="1" value="20">
      </div>

      <div class="slider-row">
        <div class="slider-header">
          <label for="greenTime">Green Time:</label>
          <span id="greenTimeVal">20s</span>
        </div>
        <input type="range" id="greenTime" min="5" max="30" step="1" value="20">
      </div>

      <div class="slider-row">
        <div class="slider-header">
          <label for="yellowTime">Yellow Time:</label>
          <span id="yellowTimeVal">3s</span>
        </div>
        <input type="range" id="yellowTime" min="2" max="5" step="0.5" value="3">
      </div>
    </div>

    <div class="control-group">
      <h3>🚧 Rules & Signs</h3>

      <label class="checkbox-container">
        No Right Turn
        <span class="switch">
          <input type="checkbox" id="noRightTurn">
          <span class="slider-toggle"></span>
        </span>
      </label>

      <label class="checkbox-container">
        Pedestrian Crossing
        <span class="switch">
          <input type="checkbox" id="pedCrossing">
          <span class="slider-toggle"></span>
        </span>
      </label>
    </div>
  </div>

  <script type="module" src="script.js"></script>
</body>

</html>
